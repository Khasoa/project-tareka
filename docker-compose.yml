version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tareka_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    env_file:
      - .env.example
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    image: node:20-alpine
    command: sh -c "npm install && npm run dev"
    working_dir: /app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./apps/web:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
